<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
*{
    margin: 0;
padding: 0;
box-sizing: border-box;
}
    .container{
    width: 800px;
    height: 500px;
    margin: 0 auto;
    border: 1px solid black;
}



    .header{
        display: flex;
    }
    .header-left{
        width: 400px;
        height: 100px;
        background-color: yellow;
    }
    .header-right{
        width: 400px;
        height: 100px;
        background-color: red;
    }


    .nav{
        height: 100px;
        background-color: blueviolet;
    }


    .main{
        display: flex;
    }


    .main-left{
        width: 40%;
        height: 200px;
        background-color: aqua;
    }

    .main-right{
        
        width: 60%;
    }
    .main-right-1{
        height: 100px;
        background-color: burlywood;
    }
    .main-right-2{
        height: 100px;
        background-color: blueviolet;
    }
    .footer{    
    display: flex;
    }


    .footer1{
        width:25%;
        height: 100px;
        background-color: black;
    }

    .footer2{
        width:25%;
        height: 100px;
        background-color: palevioletred;
    }

    .footer3{
        width:25%;
        height: 100px;
        background-color: pink;
    }

    .footer4{
        width:25%;
        height: 100px;
        background-color: gold;
    }


</style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="header-left"></div>
            <div class="header-right"></div>
        </div>

        <div class="nav"></div>
        
        <div class="main">
            <div class="main-left"></div>
            <div class="main-right">
                <div class="main-right-1"></div>
                <div class="main-right-2"></div>
            </div>


        </div>
        <div class="footer">
            <div class="footer1"></div>
            <div class="footer2"></div>
            <div class="footer3"></div>
            <div class="footer4"></div>
        </div>
    </div>
</body>
</html>
