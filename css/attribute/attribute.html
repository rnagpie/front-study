<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        /*색상 키워드 표기법*/
        .clr1 {color:red;}
    
    
        /* RGB표기법*/
        .clr2 {color:rgb(105, 130, 231)}

        /* RGBA alpha 투명도 (투명 0~1: 불투명)*/
        .clr2 {color:rgba(105, 130, 231, 0.5); }
        
        /*16진수 표기법*/
        .clr3 {color: #DDA853 }

        /* 크롬 확장프로그램 : color picker 
                            ---> 사이트 컬러코드 추출 가능*/
        </style>

</head>
<body>
    <h1 class="clr1">color check clr1</h1>
    <h1 class="clr2">color check clr1</h1>
    <h1 class="clr3">color check clr1</h1>
</body>
</html>
